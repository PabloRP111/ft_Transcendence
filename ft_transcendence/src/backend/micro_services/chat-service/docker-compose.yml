services:
  # Start DB only (for local dev / integration tests):
  #   docker compose up
  # Start full stack (DB + containerised service):
  #   docker compose --profile full up

  chat-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_pass
      POSTGRES_DB: chat_db
    ports:
      - "5433:5432"
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  chat-service:
    profiles: ["full"]
    build: .
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      chat-db:
        condition: service_healthy

volumes:
  chat-db-data:
